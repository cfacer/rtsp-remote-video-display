<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0a0a0a"/>

  <!-- Background grid -->
  <g stroke="#111d26" stroke-width="1" opacity="0.7">
    <line x1="0" y1="0" x2="0" y2="500"/>
    <line x1="60" y1="0" x2="60" y2="500"/>
    <line x1="120" y1="0" x2="120" y2="500"/>
    <line x1="180" y1="0" x2="180" y2="500"/>
    <line x1="240" y1="0" x2="240" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="360" y1="0" x2="360" y2="500"/>
    <line x1="420" y1="0" x2="420" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="540" y1="0" x2="540" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="660" y1="0" x2="660" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
    <line x1="780" y1="0" x2="780" y2="500"/>
    <line x1="0" y1="0" x2="800" y2="0"/>
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="420" x2="800" y2="420"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
  </g>

  <!-- Glow rings (pulsing, shown at mid-pulse) -->
  <ellipse cx="400" cy="230" rx="175" ry="115" fill="none" stroke="#011820" stroke-width="1"/>
  <ellipse cx="400" cy="230" rx="157" ry="97"  fill="none" stroke="#021c22" stroke-width="1"/>
  <ellipse cx="400" cy="230" rx="139" ry="79"  fill="none" stroke="#031f24" stroke-width="1"/>
  <ellipse cx="400" cy="230" rx="121" ry="61"  fill="none" stroke="#042226" stroke-width="1"/>
  <!-- Soft radial glow -->
  <ellipse cx="400" cy="230" rx="220" ry="160" fill="url(#glowGrad)"/>

  <!-- Camera body -->
  <rect x="300" y="183" width="200" height="112" rx="4" fill="#0d1b2a" stroke="#00d4ff" stroke-width="2"/>

  <!-- Viewfinder bump -->
  <rect x="375" y="165" width="50" height="20" rx="2" fill="#0d1b2a" stroke="#00d4ff" stroke-width="2"/>

  <!-- Lens outer animated ring (mid-pulse) -->
  <circle cx="400" cy="243" r="45" fill="none" stroke="#006080" stroke-width="2"/>

  <!-- Lens body -->
  <circle cx="400" cy="243" r="39" fill="#060e18" stroke="#00d4ff" stroke-width="3"/>

  <!-- Inner rings -->
  <circle cx="400" cy="243" r="27" fill="none" stroke="#003566" stroke-width="1"/>
  <circle cx="400" cy="243" r="17" fill="none" stroke="#002244" stroke-width="1"/>

  <!-- Lens highlight -->
  <circle cx="387" cy="230" r="7" fill="#1a3a5a" stroke="none"/>

  <!-- Scan line (mid position through lens) -->
  <line x1="363" y1="243" x2="437" y2="243" stroke="#00ffee" stroke-width="1.5" opacity="0.9"/>

  <!-- Record dot (lit red) -->
  <circle cx="474" cy="201" r="8" fill="#ff3333"/>

  <!-- Signal bars (left side, first 2 dim, last 2 lit) -->
  <!-- bar 1: height 6 -->
  <rect x="312" y="203" width="6" height="6"  fill="#0e2222"/>
  <!-- bar 2: height 9 -->
  <rect x="322" y="200" width="6" height="9"  fill="#0e2222"/>
  <!-- bar 3: height 12 -->
  <rect x="332" y="197" width="6" height="12" fill="#00838f"/>
  <!-- bar 4: height 16 -->
  <rect x="342" y="193" width="6" height="16" fill="#00838f"/>

  <!-- Corner brackets -->
  <g stroke="#003344" stroke-width="2" fill="none">
    <!-- Top-left -->
    <line x1="18" y1="18" x2="50" y2="18"/>
    <line x1="18" y1="18" x2="18" y2="50"/>
    <!-- Top-right -->
    <line x1="782" y1="18" x2="750" y2="18"/>
    <line x1="782" y1="18" x2="782" y2="50"/>
    <!-- Bottom-left -->
    <line x1="18" y1="482" x2="50" y2="482"/>
    <line x1="18" y1="482" x2="18" y2="450"/>
    <!-- Bottom-right -->
    <line x1="782" y1="482" x2="750" y2="482"/>
    <line x1="782" y1="482" x2="782" y2="450"/>
  </g>

  <!-- Title text -->
  <text x="400" y="354" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="20" font-weight="bold" fill="#00d4ff">RTSP Remote Video Display</text>

  <!-- Subtitle -->
  <text x="400" y="392" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="12" fill="#555555">Awaiting feed...</text>
</svg>
