name: Lint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8 paho-mqtt PyYAML

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; warn on style issues
          flake8 rtsp_display/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 rtsp_display/ --count --max-line-length=100 --statistics
